<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ece9e6, #ffffff);
        }
        h1 {
            text-align: center;
            padding: 20px;
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .box {
            overflow: hidden;
            border-radius: 10px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .box img {
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease, filter 0.5s ease;
        }
        /* Hover Effects */
        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .box:hover img {
            transform: scale(1.2);
            filter: brightness(0.8);
        }
        /* Overlay */
        .box::after {
            content: "View";
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            opacity: 0;
            transition: 0.4s;
        }
        .box:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>🌸 Image Gallery 🌸</h1>
    <div class="gallery">
        <div class="box">
            <img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=464&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div class="box">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div class="box">
            <img src="https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?q=80&w=869&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        </div>
        <div class="box">
